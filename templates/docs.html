{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- Use Tailwind Typography -->
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: { background: '#000000', surface: '#0a0a0a', border: '#27272a' },
                fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'] }
            }
        }
    }
</script>

<div class="flex flex-col md:flex-row gap-8 -mt-6">
    <!-- Sidebar Navigation (Mintlify feel) -->
    <aside class="w-full md:w-64 shrink-0 border-r border-border md:min-h-[calc(100vh-148px)] pr-6 py-6 hidden md:block border-dashed">
        <div class="flex items-center gap-2 mb-6 px-2">
            <svg class="w-5 h-5 text-zinc-100" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <h3 class="text-sm font-semibold text-zinc-100">Documentation</h3>
        </div>
        
        <div class="mb-4 px-2">
            <div class="relative">
                <input type="text" placeholder="Search..." class="w-full bg-white/5 border border-border rounded-lg pl-8 pr-3 py-1.5 text-sm text-zinc-300 focus:outline-none focus:border-zinc-500 transition-colors">
                <svg class="w-4 h-4 text-zinc-500 absolute left-2.5 top-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>

        <ul class="space-y-1">
            {% for item in nav_items %}
            <li>
                <a href="/docs/{{ item }}" class="block px-3 py-2 text-sm rounded-lg transition-all duration-200 {% if current_page == item %}bg-white/10 text-white font-medium shadow-sm{% else %}text-zinc-400 hover:text-white hover:bg-white/5{% endif %}">
                    {{ item.replace('-', ' ').replace('_', ' ').title() }}
                </a>
            </li>
            {% endfor %}
        </ul>
    </aside>

    <!-- Main Content -->
    <article class="flex-1 py-6 min-w-0 md:pl-4">
        <div id="markdown-content" class="prose prose-invert prose-zinc max-w-4xl mx-auto prose-pre:bg-[#0d1117] prose-pre:border prose-pre:border-border prose-pre:shadow-xl prose-headings:font-semibold prose-a:text-blue-400 hover:prose-a:text-blue-300 hover:prose-a:underline prose-img:rounded-xl">
            <!-- Fallback loading skeleton -->
            <div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-zinc-800 rounded w-3/4"></div>
                    <div class="space-y-2">
                        <div class="h-4 bg-zinc-800 rounded"></div>
                        <div class="h-4 bg-zinc-800 rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </div>
    </article>
    
    <!-- Right Table of Contents Sidebar -->
    <aside class="w-48 shrink-0 hidden lg:block py-6 pl-4 border-l border-border border-dashed sticky top-14 self-start h-[calc(100vh-56px)] overflow-y-auto">
        <h4 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-4">On this page</h4>
        <ul id="toc" class="space-y-2 text-sm text-zinc-400 flex flex-col gap-1 pr-2">
            <!-- Populated by JS -->
        </ul>
    </aside>
</div>

<script>
    const rawContent = {{ content|tojson|safe }};
    
    // Configure marked to use highlight.js
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
    });

    const htmlContent = marked.parse(rawContent);
    const contentDiv = document.getElementById('markdown-content');
    contentDiv.innerHTML = htmlContent;

    // Generate Table of Contents from h2 and h3
    const tocList = document.getElementById('toc');
    const headings = contentDiv.querySelectorAll('h2, h3');
    
    headings.forEach((heading, index) => {
        if (!heading.id) {
            // make a slug out of toLowerCase
            heading.id = heading.innerText.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        }
        
        const isSub = heading.tagName.toLowerCase() === 'h3';
        const li = document.createElement('li');
        li.className = isSub ? 'pl-3' : '';
        
        const a = document.createElement('a');
        a.href = '#' + heading.id;
        a.className = 'hover:text-zinc-100 transition-colors block py-1 truncate text-xs';
        a.innerText = heading.innerText;
        
        li.appendChild(a);
        tocList.appendChild(li);
    });
</script>
{% endblock %}
